name: Rental Monitor

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 Norway time (CEST/CET offset handled by UTC+1/2)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        id: monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          python main.py
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit updated database and matches
        run: |
          git config user.name  "rental-monitor[bot]"
          git config user.email "rental-monitor[bot]@users.noreply.github.com"
          git add data/listings.db matches.md
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "chore: update listings $(date -u +%Y-%m-%d)" && git push

      - name: Open issue for new matching listings
        if: steps.monitor.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🏠 New matching rentals — $(date -u +%Y-%m-%d)" \
            --body-file matches.md
